name: T_Raider Daily Autopilot

on:
  workflow_dispatch:
  schedule:
    - cron: '10 10 * * 1-5'  # 15:40 IST

permissions:
  contents: write

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      # ── Run Quarterly Manager ─────────────────────────────────────
      - name: Run Quarterly Autopilot
        id: bot_run
        env:
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: python -u autopilot/quarterly_manager.py --mode AUTO

      # ── Generate Reports ────────────────────────────────────────
      - name: Generate Reports
        if: success() || steps.bot_run.outcome == 'success'
        run: |
          python plot_performance.py
          python autopilot/tracker.py > config/tracker_output.txt
          python autopilot/quarterly_report.py > config/quarterly_output.txt

      # ── Publish to GitHub Step Summary ──────────────────────────
      - name: Publish Reports to GitHub Summary
        if: success() || steps.bot_run.outcome == 'success'
        run: |
          echo "### 📈 T_RAIDER PERFORMANCE REPORT" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat config/tracker_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Quarterly Performance Report" >> $GITHUB_STEP_SUMMARY
          echo '```text' >> $GITHUB_STEP_SUMMARY
          cat config/quarterly_output.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Embed chart as base64 image
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Performance Chart" >> $GITHUB_STEP_SUMMARY
          if [ -f config/performance_chart.png ]; then
            IMG_BASE64=$(base64 -w 0 config/performance_chart.png)
            echo "<img src=\"data:image/png;base64,${IMG_BASE64}\" width=\"700\" />" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Chart not generated" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Commit & Push State ─────────────────────────────────────
      - name: Commit & Push State Updates
        if: always()
        run: |
          git config --global user.name 'T-Raider-Bot'
          git config --global user.email 'bot@traider.ai'
          
          echo "Run at: $(date) | Status: ${{ steps.bot_run.outcome }}" > config/last_run_log.txt
          
          git add config/portfolio.json config/last_run_log.txt config/daily_equity.csv config/performance_chart.png config/quarterly_config.json
          git add -f config/capital_override.json
          
          git commit -m "Autopilot: $(date) [${{ steps.bot_run.outcome }}]" || true
          git push
