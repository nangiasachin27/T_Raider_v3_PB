name: T_Raider Daily Autopilot Run

on:
  schedule:
    # Runs Monday to Friday at 15:45 IST (10:15 UTC) after market close
    - cron: '15 10 * * 1-5'
  workflow_dispatch:
    inputs:
      force_mode:
        description: 'Override Execution Mode'
        required: true
        default: 'AGGRESSIVE'
        type: choice
        options:
          - AUTO
          - BALANCED
          - AGGRESSIVE

jobs:
  run-trading-system:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout Code ────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ── 2. Set Up Environment ───────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # ── 3. Run Autopilot Core Loop ──────────────────────────────────────────
      - name: Run Core Autopilot Cycle
        id: bot_run
        env:
          UPSTOX_API_KEY: ${{ secrets.UPSTOX_API_KEY }}
          UPSTOX_API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
          UPSTOX_ACCESS_TOKEN: ${{ secrets.UPSTOX_ACCESS_TOKEN }}
        run: |
          # Use manual dispatch input if available, otherwise default to AGGRESSIVE configuration
          EXEC_MODE="${{ github.event.inputs.force_mode || 'AGGRESSIVE' }}"
          python -u autopilot/quarterly_manager.py --mode $EXEC_MODE

      # ── 4. Render New Performance Dashboard ─────────────────────────────────
      - name: Generate Analytics Graphics
        if: always() # Ensure visual analysis triggers even if minor cycle faults occur
        run: |
          python plot_performance.py

      # ── 5. Print Performance Dashboard to Workflow Summary ──────────────────
      - name: Publish Performance Dashboard to Output Summary
        if: always()
        run: |
          echo "## 📊 T_Raider Performance Summary" >> $GITHUB_STEP_SUMMARY
          echo "System execution cycle finished at $(date)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Portfolio Analytics Visualization Dashboard" >> $GITHUB_STEP_SUMMARY
          # Embedding raw GitHub routing link for immediate rendering on the Actions Summary page
          echo "![Performance Dashboard](https://github.com/${{ github.repository }}/raw/${{ github.ref_name }}/config/performance_dashboard.png)" >> $GITHUB_STEP_SUMMARY

      # ── 6. Persist Updated Tracking States ──────────────────────────────────
      - name: Commit and Push Updated State Logs
        if: success()
        run: |
          git config --local user.email "bot@t_raider.internal"
          git config --local user.name "T_Raider Quant Bot"
          
          # Stage configuration files, manual run records, and the new dashboard image
          git add config/portfolio.json config/performance_dashboard.png config/last_run_log.txt config/manual_logs/
          
          # Commit modifications safely if states shifted during today's market cycle
          git commit -m "🤖 Auto-Update: Core state logs & performance dashboard [Skip CI]" || echo "No state delta detected today."
          git push origin ${{ github.ref_name }}
